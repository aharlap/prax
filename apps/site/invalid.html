          {

            "block": "compare",

            "meta": {
              "title": "Invalid compare config",
              "lang": "en"

        <div data-prax-ssr>
          <section class="prax-compare" lang="en">
            <h2>Invalid compare fallback</h2>
            <p>This fallback remains readable when configuration validation fails.</p>
          </section>
        </div>
      </prax-compare>
